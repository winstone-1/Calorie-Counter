<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calorie-Counter</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body>
  <div class="my-10 px-4">
    <div class="container mx-auto max-w-xs sm:max-w-md md:max-w-lg shadow-xl dark:shadow-none py-6 px-6 sm:px-10 bg-white dark:bg-gray-800 border-t-4 border-emerald-500 rounded-xl">
        
        <div class="mb-6">
            <h1 class="text-center text-2xl sm:text-3xl font-black text-gray-900 dark:text-white tracking-tight">
                CALORIE <span class="text-emerald-500">-</span> COUNTER
            </h1>
            
            <form action="" method="POST" class="mt-6 space-y-4">
              <!-- Food Item Input -->
                <div>
                    <label for="food" class="block text-xs font-black uppercase text-gray-500 dark:text-gray-400 mb-1">Food Item</label>
                    <input type="text" name="food" placeholder="e.g. Avocado Toast" 
                        class="block w-full border border-gray-200 dark:border-gray-600 focus:ring-2 focus:ring-emerald-500 focus:border-emerald-500 outline-none px-4 py-3 rounded-lg bg-gray-50 dark:bg-gray-700 text-gray-900 dark:text-white transition-all">
                </div>
                  <!-- Food Category Selector -->
                <div>
                    <label for="Food-Type" class="block text-xs font-black uppercase text-gray-500 dark:text-gray-400 mb-1">Food Category</label>
                    <select name="food-type" id="Food-Type" 
                        class="block w-full border border-gray-200 dark:border-gray-600 focus:ring-2 focus:ring-emerald-500 focus:border-emerald-500 outline-none px-4 py-3 rounded-lg bg-gray-50 dark:bg-gray-700 text-gray-900 dark:text-white appearance-none transition-all">
                        <option value="" disabled selected>Select category</option>
                        <option value="Carbohydrates">🍞 Carbohydrates</option>
                        <option value="Proteins">🍗 Proteins</option>
                        <option value="Vitamins">🥗 Vitamins/Fats</option>
                    </select>
                </div>
                <!-- Calories Input -->
                <div>
                    <label for="calories" class="block text-xs font-black uppercase text-gray-500 dark:text-gray-400 mb-1">Calories (kcal)</label>
                    <input type="number" name="calories" placeholder="400" 
                        class="block w-full border border-gray-200 dark:border-gray-600 focus:ring-2 focus:ring-emerald-500 focus:border-emerald-500 outline-none px-4 py-3 rounded-lg bg-gray-50 dark:bg-gray-700 text-gray-900 dark:text-white transition-all">
                </div>
                //
                <button type="submit" class="w-full mt-4 bg-emerald-500 hover:bg-emerald-600 text-white font-bold py-3 rounded-lg shadow-lg shadow-emerald-200 dark:shadow-none transition-transform active:scale-95">
                    Save Entry
                </button>
            </form>
        </div>

        <div class="mt-8 pt-6 border-t border-gray-100 dark:border-gray-700">
            <div class="flex items-center justify-between px-2">
                <div>
                    <p class="text-xs font-bold text-gray-400 uppercase tracking-widest">Total Daily</p>
                    <p class="text-lg font-bold text-gray-800 dark:text-white">Calories</p>
                </div>
                <div class="text-right">
                    <span class="text-3xl font-black text-emerald-500">1,240</span>
                    <span class="text-xs font-bold text-gray-400"> kcal</span>
                </div>
            </div>
            <div class="w-full bg-gray-200 dark:bg-gray-700 rounded-full h-2 mt-4">
                <div class="bg-emerald-500 h-2 rounded-full" style="width: 65%"></div>
            </div>
        </div>
    </div>
</div>



<script src="JS/script.js"></script>
</body>
</html>
